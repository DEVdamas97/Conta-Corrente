<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Banco</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="header">
      <div class="header-icon">🏦</div>
      <h1>Simulador de Banco</h1>
      <p>Gerencie sua conta com facilidade</p>
    </div>

    <div class="card">
      <div class="card-title">Cadastro de Cliente</div>

      <input type="text" id="nome" placeholder="Nome completo">
      <input type="text" id="cpf" placeholder="CPF">
      <input type="number" id="agencia" placeholder="Agência">
      <input type="number" id="conta" placeholder="Conta">

      <button class="btn-primary" onclick="criarConta()">Criar conta</button>
    </div>

    <div class="card">
      <div class="card-title">Operações</div>

      <div class="valor-wrap">
        <span class="valor-prefix">R$</span>
        <input type="number" id="valor" placeholder="0,00">
      </div>

      <div class="btn-row">
        <button class="btn-deposit" onclick="depositar()">↑ Depositar</button>
        <button class="btn-withdraw" onclick="sacar()">↓ Sacar</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Extrato</div>
      <div id="extrato">
        <div class="extrato-vazio">Nenhuma movimentação</div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>

</body>

</html>
